name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10"

      - name: Install UI dependencies
        run: cd ui && pnpm install

      - name: Run tests
        run: make test

      - name: Build UI
        run: cd ui && pnpm build

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Run govulncheck (backend)
        uses: golang/govulncheck-action@v1
        with:
          work-dir: backend

      - name: Run govulncheck (proxy)
        uses: golang/govulncheck-action@v1
        with:
          work-dir: proxy

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10"

      - name: Install UI dependencies
        run: cd ui && pnpm install

      - name: Run pnpm audit
        run: cd ui && pnpm audit

  commitlint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lint commit messages
        uses: wagoid/commitlint-github-action@v6
