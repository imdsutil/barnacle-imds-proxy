name: Release Please

on:
  push:
    branches:
      - main

permissions: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4.4.0
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    runs-on: ubuntu-latest
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push extension images to GHCR
        env:
          TAG_FULL: ${{ needs.release-please.outputs.tag_name }}
        run: |
          make push-extension \
            IMAGE="${{ vars.DOCKER_IMAGE }}" \
            PROXY_IMAGE="${{ vars.DOCKER_IMAGE_PROXY }}" \
            TAG="${TAG_FULL#v}"

      - name: Push extension images to Docker Hub
        env:
          TAG_FULL: ${{ needs.release-please.outputs.tag_name }}
        run: |
          make push-extension \
            IMAGE="${{ vars.DOCKERHUB_IMAGE }}" \
            PROXY_IMAGE="${{ vars.DOCKERHUB_IMAGE_PROXY }}" \
            TAG="${TAG_FULL#v}"
