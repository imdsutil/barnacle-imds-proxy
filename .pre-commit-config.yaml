# .pre-commit-config.yaml
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer

  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.24.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ['@commitlint/config-conventional']

  - repo: local
    hooks:
      - id: build
        name: Build
        entry: make build
        language: system
        pass_filenames: false

      - id: test
        name: Test
        entry: make test
        language: system
        pass_filenames: false

      - id: addlicense
        name: addlicense
        entry: addlicense
        language: golang
        additional_dependencies:
          - github.com/google/addlicense@v1.1.1
        files: '\.(go|js|jsx|ts|tsx|py|sh|bash|zsh)$'
        exclude: '^(ui/build/|node_modules/|vendor/|\.venv/|dist/|build/|screenshots/)'
        args:
          - -c
          - "Matt Miller"
          - -l
          - apache
          - -y
          - "2026"
          - -v
